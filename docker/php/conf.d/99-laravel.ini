; Production-oriented defaults (override via mounted ini if needed)
expose_php = Off
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

upload_max_filesize = 32M
post_max_size = 32M
; Must be >= longest Livewire / report prep requests; otherwise nginx returns 504 while PHP already stopped.
max_execution_time = 600
memory_limit = 512M
