; Tuned for small VPS (adjust pm.max_children for your droplet RAM)
[www]
; Allow Docker / system env vars (DB_*, APP_*, etc.) into PHP workers — default Yes strips them
clear_env = no
pm = dynamic
pm.max_children = 24
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
catch_workers_output = yes
decorate_workers_output = no
; Kill runaway web requests; align with nginx fastcgi_*_timeout and max_execution_time
request_terminate_timeout = 600s
